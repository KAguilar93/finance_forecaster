# Gemini Enterprise Agent Platform (formerly Vertex AI) CustomJob spec — CPU.
#
# Submit with:
#   gcloud ai custom-jobs create \
#       --region=us-central1 \
#       --display-name=mlops489-train \
#       --config=config_cpu.yaml
#
# The single placeholder is <project-id>. The demo runners substitute this
# automatically into a temp copy of the file; for manual submission, replace
# it with `sed` or your editor.

workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
    replicaCount: 1
    containerSpec:
      imageUri: us-central1-docker.pkg.dev/finance-forecasters-pipeline/finance-forecaster-docker-containers/finance-forecaster-train:v1
